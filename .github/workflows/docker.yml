name: Docker

on:
  workflow_call:
    inputs:
      ci-workflow-name:
        description: "Name of the CI workflow that triggers nightly builds"
        type: string
        default: "CI"
      platforms:
        description: "JSON array of platform objects with platform and runner keys"
        type: string
        default: '[{"platform":"linux/amd64","runner":"ubuntu-latest"},{"platform":"linux/arm64","runner":"ubuntu-24.04-arm"}]'

concurrency:
  group: docker-release
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.platforms) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: oxidized-mc/ci/.github/actions/strip-patches@main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name
        id: meta
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          PLATFORM_TAG=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "platform_tag=${PLATFORM_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.image }}:build-${{ steps.meta.outputs.platform_tag }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}

  merge:
    name: Merge multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')

          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f1-2)
            TAGS="${IMAGE}:${VERSION} ${IMAGE}:${MINOR} ${IMAGE}:${MAJOR} ${IMAGE}:latest"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAGS="${IMAGE}:${{ github.event.inputs.tag || 'nightly' }}"
          else
            SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha || github.sha }}" | cut -c1-7)
            TAGS="${IMAGE}:nightly ${IMAGE}:sha-${SHORT_SHA}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          IMAGE="${{ steps.tags.outputs.image }}"
          # Build source tags from platforms input
          SOURCES=""
          for platform_tag in $(echo '${{ inputs.platforms }}' | jq -r '.[].platform' | tr '/' '-'); do
            SOURCES="${SOURCES} ${IMAGE}:build-${platform_tag}"
          done

          for TAG in ${{ steps.tags.outputs.tags }}; do
            docker buildx imagetools create -t "${TAG}" ${SOURCES}
            echo "✅ Created manifest: ${TAG}"
          done
