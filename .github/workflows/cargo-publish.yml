name: Cargo Publish

on:
  workflow_call:
    inputs:
      crate-name:
        description: "Crate name to publish (for logging only)"
        type: string
        default: ""
      packages:
        description: >
          Newline-separated list of packages to publish in dependency order.
          Leave empty for single-crate repos.
        type: string
        default: ""
      toolchain:
        description: "Rust toolchain to use"
        type: string
        default: "stable"
      dry-run:
        description: "Perform a dry run without actually publishing"
        type: boolean
        default: false
    secrets:
      CARGO_REGISTRY_TOKEN:
        description: "crates.io API token"
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oxidized-mc/ci/.github/actions/strip-patches@main

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-publish-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-publish-

      - name: Verify package(s)
        shell: bash
        run: |
          PACKAGES="${{ inputs.packages }}"
          if [ -z "$PACKAGES" ]; then
            cargo package --allow-dirty
          else
            echo "$PACKAGES" | while IFS= read -r pkg; do
              pkg=$(echo "$pkg" | xargs)
              [ -z "$pkg" ] && continue
              echo "::group::Packaging $pkg"
              cargo package --allow-dirty -p "$pkg"
              echo "::endgroup::"
            done
          fi

      - name: Publish
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          DRY_RUN="${{ inputs.dry-run && '--dry-run' || '' }}"
          PACKAGES="${{ inputs.packages }}"

          if [ -z "$PACKAGES" ]; then
            cargo publish $DRY_RUN
          else
            COUNT=0
            while IFS= read -r pkg; do
              pkg=$(echo "$pkg" | xargs)
              [ -z "$pkg" ] && continue

              if [ "$COUNT" -gt 0 ]; then
                echo "Waiting 30s for crates.io to index previous crate..."
                sleep 30
              fi
              COUNT=$((COUNT + 1))

              echo "::group::Publishing $pkg"
              cargo publish $DRY_RUN -p "$pkg"
              echo "::endgroup::"
            done <<< "$PACKAGES"
          fi
