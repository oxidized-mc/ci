name: Cargo Publish

on:
  workflow_call:
    inputs:
      crate-name:
        description: "Crate name to publish (for logging only)"
        type: string
        default: ""
      toolchain:
        description: "Rust toolchain to use"
        type: string
        default: "stable"
      dry-run:
        description: "Perform a dry run without actually publishing"
        type: boolean
        default: false
    secrets:
      CARGO_REGISTRY_TOKEN:
        description: "crates.io API token"
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-publish-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-publish-

      - name: Verify package
        run: cargo package --allow-dirty

      - name: Publish
        run: cargo publish ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
