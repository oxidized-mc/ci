name: Workflow Enhancement
description: Suggest a new reusable workflow or improvement to existing ones
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion!

  - type: dropdown
    id: type
    attributes:
      label: Enhancement type
      options:
        - New reusable workflow
        - Improvement to existing workflow
        - New CI/CD feature (caching, matrix, etc.)
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Which repos benefit?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
