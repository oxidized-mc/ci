name: Workflow Bug
description: Report a CI/CD workflow issue (failure, incorrect behavior, flaky test)
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a workflow issue!
        Please fill in as much detail as possible.

  - type: input
    id: workflow
    attributes:
      label: Affected workflow
      placeholder: "e.g. rust-ci.yml, release-please.yml, cargo-publish.yml"
    validations:
      required: true

  - type: input
    id: run-url
    attributes:
      label: Failed run URL (if applicable)
      placeholder: "https://github.com/oxidized-mc/.../actions/runs/..."

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the workflow issue.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: text
